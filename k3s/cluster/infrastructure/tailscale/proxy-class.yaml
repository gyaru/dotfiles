apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: default
spec:
  metrics:
    enable: true
    serviceMonitor:
      enable: false
  statefulSet:
    pod:
      tailscaleContainer:
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
