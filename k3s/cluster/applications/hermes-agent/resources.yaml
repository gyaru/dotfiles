apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-agent-data
  labels:
    app: hermes-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  labels:
    app: hermes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      containers:
        - name: hermes-agent
          image: nousresearch/hermes-agent:v2026.7.20
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: http
            - containerPort: 9119
              name: dashboard
          env:
            - name: TZ
              value: "Europe/Stockholm"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hermes-dashboard-auth
                  key: username
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-dashboard-auth
                  key: password
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              memory: "768Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  labels:
    app: hermes-agent
spec:
  type: ClusterIP
  ports:
    - port: 8642
      targetPort: 8642
      protocol: TCP
      name: http
    - port: 9119
      targetPort: 9119
      protocol: TCP
      name: dashboard
  selector:
    app: hermes-agent
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-agent-policy
spec:
  podSelector:
    matchLabels:
      app: hermes-agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
      ports:
        - protocol: TCP
          port: 8642
        - protocol: TCP
          port: 9119
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-agent
  annotations:
    tailscale.com/hostname: "hermes"
    tailscale.com/tags: "tag:k8s"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: hermes-agent
      port:
        number: 9119
  tls:
    - hosts:
        - hermes
